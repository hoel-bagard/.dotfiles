name: Lint Bash

on:
  workflow_dispatch:
  push:
    branches: master
  pull_request:
    paths:
      - ".bashrc"
      - ".github/workflows/lint-bash.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  bash-lint:
    name: Check bash formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Install shfmt
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.0
          echo "Installed shfmt version $(shfmt --version)"

      - name: Run shfmt
        run: shfmt .bashrc
